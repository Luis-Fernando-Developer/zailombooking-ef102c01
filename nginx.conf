server {
    listen 80;
    server_name localhost;

    # -------------------------------------------------------------------------
    # OpenAPI spec — CORS liberado para consumo por Postman, Insomnia,
    # Swagger UI hospedado externamente, geradores de SDK, LLMs, etc.
    # -------------------------------------------------------------------------
    location = /openapi.json {
        root /usr/share/nginx/html;
        default_type application/vnd.oai.openapi+json;
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;
        add_header Cache-Control "public, max-age=300" always;
        add_header Link "</openapi.json>; rel=\"service-desc\"; type=\"application/vnd.oai.openapi+json\"" always;
    }

    location = /openapi.yaml {
        root /usr/share/nginx/html;
        default_type application/vnd.oai.openapi+yaml;
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;
        add_header Cache-Control "public, max-age=300" always;
    }

    location = /.well-known/openapi.json {
        root /usr/share/nginx/html;
        default_type application/vnd.oai.openapi+json;
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;
        add_header Cache-Control "public, max-age=300" always;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
