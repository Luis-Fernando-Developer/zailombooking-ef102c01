version: "3.8"

# =============================================================================
# Stack: api-booking  (Traefik + Nginx -> Supabase Edge Function `public-api`)
# =============================================================================
# PRÉ-REQUISITOS no Traefik da sua VPS (confirme os nomes reais no seu traefik.yml
# ou nas flags do container do Traefik). Se forem diferentes, ajuste as labels:
#
#   entryPoints:
#     web:        (porta 80)     <- usado em `entrypoints=web`
#     websecure:  (porta 443)    <- usado em `entrypoints=websecure`
#   certificatesResolvers:
#     letsencrypt: ...           <- usado em `certresolver=letsencrypt`
#
# E o container do Traefik PRECISA estar conectado à rede `api-booking-net`
# (você já fez isso). Confirme com:  docker network inspect api-booking-net
# =============================================================================

services:
  api-booking:
    image: nginx:1.27-alpine
    container_name: api-booking
    restart: unless-stopped
    networks:
      - api-booking-net
    configs:
      - source: api_booking_nginx
        target: /etc/nginx/conf.d/default.conf
    environment:
      - TZ=America/Sao_Paulo
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=api-booking-net"

      # ---- HTTP (porta 80) ----
      - "traefik.http.routers.api-booking-http.rule=Host(`api-booking.zailom.com`)"
      - "traefik.http.routers.api-booking-http.entrypoints=web"
      - "traefik.http.routers.api-booking-http.service=api-booking"

      # ---- HTTPS (porta 443) — só ativa depois que HTTP responder ----
      - "traefik.http.routers.api-booking-https.rule=Host(`api-booking.zailom.com`)"
      - "traefik.http.routers.api-booking-https.entrypoints=websecure"
      - "traefik.http.routers.api-booking-https.tls=true"
      - "traefik.http.routers.api-booking-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.api-booking-https.service=api-booking"

      # ---- Service (aponta pra porta 80 do nginx) ----
      - "traefik.http.services.api-booking.loadbalancer.server.port=80"

configs:
  api_booking_nginx:
    content: |
      # ------------------------------------------------------------------
      # api-booking.zailom.com  ->  Supabase Edge Function `public-api`
      # Reescreve /v1/*  =>  /functions/v1/public-api/v1/*
      # Injeta o header `apikey` (anon key) exigido pelo Supabase Gateway.
      # A API key do cliente (Bearer zlm_...) segue intacta em Authorization.
      # ------------------------------------------------------------------
      resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
      resolver_timeout 5s;

      # >>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
      # OBRIGATÓRIO: substitua pela ANON/PUBLISHABLE KEY do seu Supabase
      # (Project Settings -> API -> anon public). Sem isso o proxy falha.
      # >>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
      map $host $supabase_anon {
        default "COLE_AQUI_A_ANON_KEY_DO_SUPABASE";
      }

      server {
        listen 80 default_server;
        server_name _;

        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Headers "authorization, x-api-key, content-type, apikey" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;

        if ($request_method = OPTIONS) { return 204; }

        location = /healthz {
          access_log off;
          default_type text/plain;
          return 200 "ok\n";
        }

        location /v1/ {
          proxy_pass https://pmczddukpylhdeaemmyv.supabase.co/functions/v1/public-api$request_uri;

          proxy_http_version 1.1;
          proxy_ssl_server_name on;
          proxy_set_header Host              pmczddukpylhdeaemmyv.supabase.co;
          proxy_set_header apikey            $supabase_anon;
          proxy_set_header Authorization     $http_authorization;
          proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto https;

          proxy_connect_timeout 15s;
          proxy_read_timeout    60s;
          proxy_send_timeout    60s;
        }

        location = / {
          return 302 https://booking.zailom.com/api-docs;
        }

        location / {
          default_type application/json;
          return 404 '{"error":"not_found","hint":"use /v1/<endpoint>"}';
        }
      }

networks:
  api-booking-net:
    external: true
