version: "3.8"

# =============================================================================
# Stack: api-booking  (Traefik + Nginx -> Supabase Edge Function `public-api`)
# =============================================================================
# Seu Traefik (confirmado via `docker inspect traefik`):
#   entrypoints:            web (80), websecure (443)
#   certificatesresolver:   leresolver   <-- (NÃO é "letsencrypt")
#   rede compartilhada:     api-booking-net  (traefik já está anexado)
#
# >>>>>>> ANTES DE SUBIR: cole a PUBLISHABLE KEY do Supabase em SUPABASE_PUBLISHABLE_KEY <<<<<<
# Use a chave `sb_publishable_...` mostrada em Settings > API Keys > Publishable key.
# Não use a `booking_secret_key` e não use a chave da API pública `zlm_...` aqui.
# =============================================================================

services:
  api-booking:
    image: nginx:1.27-alpine
    container_name: api-booking
    restart: unless-stopped
    networks:
      - api-booking-net
    environment:
      - TZ=America/Sao_Paulo
      # Project Settings -> API Keys -> Publishable key (sb_publishable_...)
      - SUPABASE_PUBLISHABLE_KEY=COLE_AQUI_A_PUBLISHABLE_KEY_DO_SUPABASE
      - SUPABASE_HOST=pmczddukpylhdeaemmyv.supabase.co
    # Escreve o nginx.conf em runtime (sem depender de `configs:` do Compose)
    command:
      - /bin/sh
      - -c
      - |
        cat > /etc/nginx/conf.d/default.conf <<'NGINXCONF'
        resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
        resolver_timeout 5s;

        # CORS injetado em TODO response (incluindo 4xx/5xx e proxied).
        # Usamos `map` porque `add_header` no server-level não é herdado quando
        # o location tem seus proprios add_header/proxy_hide_header.
        map $$request_method $$cors_method_ok { default 1; }

        server {
          listen 80 default_server;
          server_name _;

          # --- CORS global (aplicado em todos os locations via `always`) ------
          add_header Access-Control-Allow-Origin  "*" always;
          add_header Access-Control-Allow-Headers "authorization, x-api-key, content-type, apikey, x-client-info" always;
          add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
          add_header Access-Control-Max-Age       "86400" always;

          location = /healthz {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
          }

          location /v1/ {
            # Repete os add_header aqui — nginx NAO herda quando o location
            # define seus proprios add_header/proxy_hide_header.
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Headers "authorization, x-api-key, content-type, apikey, x-client-info" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Max-Age       "86400" always;

            # Preflight: responde direto sem tocar no upstream.
            if ($$request_method = OPTIONS) {
              add_header Access-Control-Allow-Origin  "*" always;
              add_header Access-Control-Allow-Headers "authorization, x-api-key, content-type, apikey, x-client-info" always;
              add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
              add_header Access-Control-Max-Age       "86400" always;
              add_header Content-Length 0;
              add_header Content-Type   "text/plain";
              return 204;
            }

            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_pass https://__SUPABASE_HOST__/functions/v1/public-api/v1/;
            proxy_http_version 1.1;
            proxy_ssl_server_name on;
            proxy_set_header Host              __SUPABASE_HOST__;
            proxy_set_header apikey            __SUPABASE_PUBLISHABLE_KEY__;
            proxy_set_header Authorization     $$http_authorization;
            proxy_set_header X-Forwarded-For   $$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_connect_timeout 15s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
          }

          # OpenAPI live spec -> edge function `openapi-spec`
          location = /openapi/live {
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Headers "authorization, x-api-key, content-type, apikey, x-client-info" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;

            if ($$request_method = OPTIONS) {
              add_header Access-Control-Allow-Origin  "*" always;
              add_header Access-Control-Allow-Headers "authorization, x-api-key, content-type, apikey, x-client-info" always;
              add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
              return 204;
            }

            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_pass https://__SUPABASE_HOST__/functions/v1/openapi-spec;
            proxy_http_version 1.1;
            proxy_ssl_server_name on;
            proxy_set_header Host           __SUPABASE_HOST__;
            proxy_set_header apikey         __SUPABASE_PUBLISHABLE_KEY__;
            proxy_set_header Authorization  "Bearer __SUPABASE_PUBLISHABLE_KEY__";
            proxy_connect_timeout 15s;
            proxy_read_timeout    30s;
          }

          location = / { return 302 https://booking.zailom.com/api-docs; }

          location / {
            default_type application/json;
            return 404 '{"error":"not_found","hint":"use /v1/<endpoint>"}';
          }
        }
        NGINXCONF
        sed -i "s|__SUPABASE_HOST__|$$SUPABASE_HOST|g; s|__SUPABASE_PUBLISHABLE_KEY__|$$SUPABASE_PUBLISHABLE_KEY|g" /etc/nginx/conf.d/default.conf
        exec nginx -g 'daemon off;'
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=api-booking-net"

      # HTTP :80  -> redireciona para HTTPS
      - "traefik.http.routers.api-booking-http.rule=Host(`api-booking.zailom.com`)"
      - "traefik.http.routers.api-booking-http.entrypoints=web"
      - "traefik.http.routers.api-booking-http.middlewares=api-booking-redirect"
      - "traefik.http.middlewares.api-booking-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.api-booking-redirect.redirectscheme.permanent=true"

      # HTTPS :443
      - "traefik.http.routers.api-booking.rule=Host(`api-booking.zailom.com`)"
      - "traefik.http.routers.api-booking.entrypoints=websecure"
      - "traefik.http.routers.api-booking.tls=true"
      - "traefik.http.routers.api-booking.tls.certresolver=leresolver"
      - "traefik.http.routers.api-booking.service=api-booking"

      - "traefik.http.services.api-booking.loadbalancer.server.port=80"

networks:
  api-booking-net:
    external: true
